name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-22.04
            cross: false
          - target: linux-arm64
            os: ubuntu-22.04
            cross: true
          - target: darwin-arm64
            os: macos-latest
            cross: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux native (amd64) ──
      - name: Install deps (Linux amd64)
        if: matrix.target == 'linux-amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config libuv1-dev

      - name: Build (Linux amd64)
        if: matrix.target == 'linux-amd64'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-O2"
          cmake --build build -j$(nproc)
          strip build/tinyserve

      # ── Linux cross (arm64) ──
      - name: Install deps & cross-build libuv (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake gcc-aarch64-linux-gnu

          # Build libuv from source for aarch64
          git clone --depth 1 --branch v1.48.0 https://github.com/libuv/libuv.git /tmp/libuv-src
          cmake -S /tmp/libuv-src -B /tmp/libuv-build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/libuv-arm64 \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_TESTING=OFF \
            -DLIBUV_BUILD_SHARED=OFF
          cmake --build /tmp/libuv-build -j$(nproc)
          cmake --install /tmp/libuv-build

      - name: Build (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2" \
            -DCMAKE_PREFIX_PATH=/tmp/libuv-arm64 \
            -DLIBUV_INCLUDE_DIRS=/tmp/libuv-arm64/include \
            -DLIBUV_LIBRARIES=/tmp/libuv-arm64/lib/libuv.a
          cmake --build build -j$(nproc)
          aarch64-linux-gnu-strip build/tinyserve

      # ── macOS ──
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libuv cmake pkg-config

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-O2"
          cmake --build build -j$(sysctl -n hw.ncpu)
          strip build/tinyserve

      # ── Package as a tarball with binary + docs + man page ──
      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="tinyserve-${VERSION}-${{ matrix.target }}"
          mkdir -p "${DIR}/man"
          cp build/tinyserve "${DIR}/tinyserve"
          cp README.md LICENSE CHANGELOG.md "${DIR}/" 2>/dev/null || true
          cp man/tinyserve.1 "${DIR}/man/" 2>/dev/null || true
          tar -czf "${DIR}.tar.gz" "${DIR}"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"
          # Also keep the bare binary for users who want a quick download.
          cp build/tinyserve "tinyserve-${{ matrix.target }}"
          shasum -a 256 "tinyserve-${{ matrix.target }}" \
            > "tinyserve-${{ matrix.target }}.sha256"
          echo "BIN_NAME=tinyserve-${{ matrix.target }}" >> $GITHUB_ENV
          echo "TAR_NAME=${DIR}"                           >> $GITHUB_ENV

      # ── Build a .deb on the native amd64 Linux runner ──
      - name: Build .deb (Linux amd64 only)
        if: matrix.target == 'linux-amd64'
        run: |
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts fakeroot dh-make systemd
          # Clean any prior CMake build artefacts in workspace; debuild
          # uses its own build dir under obj-*.
          rm -rf debian/.debhelper debian/files debian/tinyserve \
                 debian/tmp debian/debhelper-build-stamp obj-*
          dpkg-buildpackage -us -uc -b
          mkdir -p deb-out
          mv ../tinyserve_*.deb deb-out/
          ( cd deb-out && for f in tinyserve_*.deb; do
              shasum -a 256 "$f" > "${f}.sha256"
            done )

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAR_NAME }}
          path: |
            ${{ env.TAR_NAME }}.tar.gz
            ${{ env.TAR_NAME }}.tar.gz.sha256
            ${{ env.BIN_NAME }}
            ${{ env.BIN_NAME }}.sha256

      - uses: actions/upload-artifact@v4
        if: matrix.target == 'linux-amd64'
        with:
          name: deb-amd64
          path: |
            deb-out/tinyserve_*.deb
            deb-out/tinyserve_*.deb.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tinyserve-*
            artifacts/tinyserve_*.deb
            artifacts/tinyserve_*.deb.sha256
