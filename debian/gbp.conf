[DEFAULT]
debian-branch = debian/sid
upstream-branch = main
upstream-tag = v%(version)s
# No pristine-tar branch yet — for now generate the orig tarball
# directly from the v<ver> git tag. Once the package lands in
# the archive a pristine-tar branch can be added and this flipped
# back to True.
pristine-tar = False

[buildpackage]
# Use the upstream tag (e.g. v0.3.0) as the source of the orig
# tarball instead of looking for a pristine-tar commit.
upstream-tree = TAG
